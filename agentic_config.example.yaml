# agentic-system Configuration Example
# Copy to agentic_config.yaml and customize

orchestration_enabled: true
events_db_path: ".agentic/events.db"

council:
  members:
    - id: "claude-sonnet-5"
      provider: "anthropic"
      weight: 1.1
    - id: "gpt-4o"
      provider: "openai"
      weight: 1.0
    - id: "gemini-2.5-pro"
      provider: "openrouter"
      weight: 0.9
    - id: "nemotron-3-ultra"
      provider: "nvidia"
      weight: 1.2
  thresholds:
    min_overall: 4.0
    min_safety: 4.5
    min_tests: 3.5
    min_agreement: 0.7
    reject_max_overall: 2.5
  peer_eval: "high_risk_only"   # never | high_risk_only | always
  min_quorum: 2

breakers:
  global_auto_recover_seconds: 300
  agent_auto_close_on_success: true
  workflow_auto_close_on_success: true

no_progress:
  window: 3
  threshold: 0.9
  embedding_backend: "auto"          # auto | sentence-transformers | deterministic | engraphis
  embedding_model: "all-MiniLM-L6-v2"

sweeps:
  heartbeat_enabled: true
  heartbeat_schedule: "*/5 * * * *"
  stuck_recovery_enabled: true
  stuck_recovery_schedule: "*/10 * * * *"
  stuck_threshold_min: 30
  watchdog_enabled: true
  watchdog_schedule: "*/5 * * * *"
  consolidate_enabled: true
  consolidate_schedule: "0 3 * * *"
  event_retention_days: 30

